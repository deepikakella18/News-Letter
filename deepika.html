<!DOCTYPE html>
<html>
<head>
    <title>Newsletter Sign Up</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        .container {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        input[type="email"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Newsletter Sign Up</h2>
    <p>Subscribe to receive updates!</p>

    <form>
        <input type="email" placeholder="Enter your email" required>
        <br>
        <button type="submit">Subscribe</button>
    </form>
</div>

</body>
</html>
